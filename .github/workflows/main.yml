name: TrackNFix CI/CD Pipeline

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    build-and-test:
        runs-on: ubuntu-latest

        services:
            postgres:
                image: postgres:15-alpine
                env:
                    POSTGRES_USER: postgres
                    POSTGRES_PASSWORD: password
                    POSTGRES_DB: tracknfix_test
                ports:
                    - 5432:5432
                options: >-
                    --health-cmd pg_isready
                    --health-interval 10s
                    --health-timeout 5s
                    --health-retries 5

        steps:
            - uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"

            - name: Install Backend Dependencies
              run: |
                  cd backend
                  npm install

            - name: Run Database Migrations (Test DB)
              run: |
                  cd backend
                  npx prisma migrate dev --name init
              env:
                  DATABASE_URL: "postgresql://postgres:password@localhost:5432/tracknfix_test"

            - name: Run Unit & Integration Tests
              run: |
                  cd backend
                  npm test
              env:
                  DATABASE_URL: "postgresql://postgres:password@localhost:5432/tracknfix_test"
                  JWT_SECRET: "test_secret"
